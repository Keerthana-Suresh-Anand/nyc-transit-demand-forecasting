name: CI & Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[pipeline,dev]"

      - name: Lint
        run: ruff check src/ tests/ pipelines/

      - name: Unit tests
        run: pytest tests/unit/ -v --tb=short

  build-and-push:
    needs: lint-and-test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push pipeline image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.pipeline
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nyc-transit-pipeline:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nyc-transit-pipeline:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.dashboard
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nyc-transit-dashboard:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nyc-transit-dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
