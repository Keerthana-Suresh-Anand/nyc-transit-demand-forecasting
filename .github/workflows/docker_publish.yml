name: Docker — Build & Publish

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push pipeline image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.pipeline
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nyc-transit-pipeline:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nyc-transit-pipeline:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.dashboard
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nyc-transit-dashboard:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nyc-transit-dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
