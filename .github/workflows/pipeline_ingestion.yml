name: Pipeline — Ingestion

on:
  schedule:
    - cron: "0 21 * * 3"   # Wednesdays 21:00 UTC / 5pm ET
  workflow_dispatch: {}

# One run at a time: a manual dispatch overlapping the weekly cron would interleave
# two watermark read->fetch->write cycles. Queue, never cancel — a killed run could
# leave bronze/watermark written but silver not yet updated.
concurrency:
  group: ingestion
  cancel-in-progress: false

env:
  AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
  AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
  AWS_BUCKET_NAME: ${{ secrets.AWS_BUCKET_NAME }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  NY_APP_TOKEN: ${{ secrets.NY_APP_TOKEN }}
  WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
  TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install DVC
        run: pip install "dvc[s3]>=3.0"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download existing silver from S3
        run: |
          mkdir -p data/silver
          aws s3 cp s3://$AWS_BUCKET_NAME/silver/mta_weather_merged.parquet \
            data/silver/mta_weather_merged.parquet || echo "No existing silver — full build"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

      - name: Run ingestion pipeline
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/nyc-transit-pipeline:latest
          docker run --rm \
            -v "$(pwd)/data:/app/data" \
            -e AWS_ACCESS_KEY="$AWS_ACCESS_KEY" \
            -e AWS_SECRET_KEY="$AWS_SECRET_KEY" \
            -e AWS_BUCKET_NAME="$AWS_BUCKET_NAME" \
            -e AWS_REGION="$AWS_REGION" \
            -e NY_APP_TOKEN="$NY_APP_TOKEN" \
            -e WEATHER_API_KEY="$WEATHER_API_KEY" \
            -e TICKETMASTER_API_KEY="$TICKETMASTER_API_KEY" \
            ${{ secrets.DOCKERHUB_USERNAME }}/nyc-transit-pipeline:latest \
            -m pipelines.run_ingestion

      - name: Snapshot silver data with DVC
        run: |
          dvc remote modify --local s3remote url s3://$AWS_BUCKET_NAME/dvc-cache
          dvc add data/silver/mta_weather_merged.parquet
          dvc push
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add data/silver/mta_weather_merged.parquet.dvc
          git diff --cached --quiet || git commit -m "dvc: update silver parquet [skip ci]"
          git push
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

      - name: Trigger prediction pipeline
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'pipeline_prediction.yml',
              ref: 'main'
            });
