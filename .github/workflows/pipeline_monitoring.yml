name: Pipeline — Monitoring

on:
  schedule:
    - cron: "0 8 * * *"   # Daily 08:00 UTC
  workflow_dispatch: {}

# One run at a time, matching the other pipelines — every pipeline is a mutex.
concurrency:
  group: monitoring
  cancel-in-progress: false

env:
  AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
  AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
  AWS_BUCKET_NAME: ${{ secrets.AWS_BUCKET_NAME }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  MLFLOW_TRACKING_URI: sqlite:///mlflow.db

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download gold data from S3
        run: |
          mkdir -p data/gold
          aws s3 cp s3://$AWS_BUCKET_NAME/gold/mta_sarima.parquet data/gold/mta_sarima.parquet
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

      - name: Run monitoring pipeline
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/nyc-transit-pipeline:stable"
          docker pull "$IMAGE"
          IMAGE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE")
          echo "Running image: $IMAGE_DIGEST"
          docker run --rm \
            -v "$(pwd)/data:/app/data" \
            -e AWS_ACCESS_KEY="$AWS_ACCESS_KEY" \
            -e AWS_SECRET_KEY="$AWS_SECRET_KEY" \
            -e AWS_BUCKET_NAME="$AWS_BUCKET_NAME" \
            -e AWS_REGION="$AWS_REGION" \
            -e MLFLOW_TRACKING_URI="sqlite:///mlflow.db" \
            -e PIPELINE_IMAGE_DIGEST="$IMAGE_DIGEST" \
            "$IMAGE" \
            -m pipelines.run_monitoring

      - name: Check retrain flag
        id: retrain
        # head-object checks existence via metadata only (no download) and exits
        # non-zero when the key is absent. The env block is needed because the aws
        # CLI expects AWS_ACCESS_KEY_ID/SECRET, not the AWS_ACCESS_KEY/SECRET names.
        run: |
          if aws s3api head-object \
               --bucket "$AWS_BUCKET_NAME" \
               --key monitoring/retrain_flag.json >/dev/null 2>&1; then
            echo "retrain_needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "retrain_needed=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

      - name: Trigger training pipeline (drift detected)
        if: steps.retrain.outputs.retrain_needed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'pipeline_training.yml',
              ref: 'main'
            });
            core.info('Retrain triggered due to drift detection.');
