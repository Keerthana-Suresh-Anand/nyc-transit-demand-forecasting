name: Pipeline — Training

on:
  schedule:
    # Every Wednesday 15:00 UTC. Cron ORs day-of-month and day-of-week when both are
    # set, so "1-7 * 3" would fire on days 1-7 OR any Wednesday (i.e. every day of the
    # first week). The `guard` job below restricts scheduled runs to the first Wednesday.
    - cron: "0 15 * * 3"
  workflow_dispatch: {}

concurrency:
  group: training
  cancel-in-progress: false

env:
  AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
  AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
  AWS_BUCKET_NAME: ${{ secrets.AWS_BUCKET_NAME }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  MLFLOW_TRACKING_URI: sqlite:///mlflow.db

jobs:
  # Gate scheduled runs to the first Wednesday of the month. Dispatched runs (the
  # drift retrain from monitoring, or a manual run) bypass the date check entirely.
  guard:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: First-Wednesday guard (scheduled runs only)
        id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Dispatched run (drift retrain or manual) — proceeding."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          elif [ "$(date -u +%-d)" -le 7 ]; then
            echo "First Wednesday of the month — proceeding."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Scheduled Wednesday but not the first of the month — skipping."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

  train:
    needs: guard
    if: needs.guard.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install DVC
        run: pip install "dvc[s3]>=3.0"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download data and MLflow state from S3
        run: |
          mkdir -p data/silver data/gold mlruns
          aws s3 cp s3://$AWS_BUCKET_NAME/silver/mta_weather_merged.parquet \
            data/silver/mta_weather_merged.parquet
          aws s3 cp s3://$AWS_BUCKET_NAME/mlflow/mlflow.db \
            mlflow.db || echo "No existing mlflow.db — starting fresh"
          aws s3 sync s3://$AWS_BUCKET_NAME/mlflow/mlruns/ mlruns/ || echo "No existing mlruns"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

      - name: Pull pipeline image and resolve digest
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/nyc-transit-pipeline:stable"
          docker pull "$IMAGE"
          # Resolve the immutable digest once so both docker steps below run the
          # same image and the run log records exactly which image executed.
          IMAGE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE")
          echo "Running image: $IMAGE_DIGEST"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
          echo "IMAGE_DIGEST=$IMAGE_DIGEST" >> "$GITHUB_ENV"

      - name: Upgrade MLflow DB schema
        run: |
          docker run --rm \
            --entrypoint mlflow \
            -v "$(pwd)/mlflow.db:/app/mlflow.db" \
            "$IMAGE" \
            db upgrade sqlite:////app/mlflow.db

      - name: Run training pipeline
        run: |
          touch mlflow.db
          docker run --rm \
            -v "$(pwd)/data:/app/data" \
            -v "$(pwd)/mlflow.db:/app/mlflow.db" \
            -v "$(pwd)/mlruns:/app/mlruns" \
            -e AWS_ACCESS_KEY="$AWS_ACCESS_KEY" \
            -e AWS_SECRET_KEY="$AWS_SECRET_KEY" \
            -e AWS_BUCKET_NAME="$AWS_BUCKET_NAME" \
            -e AWS_REGION="$AWS_REGION" \
            -e MLFLOW_TRACKING_URI="sqlite:///mlflow.db" \
            -e PIPELINE_IMAGE_DIGEST="$IMAGE_DIGEST" \
            "$IMAGE" \
            -m pipelines.run_training

      - name: Snapshot gold data with DVC
        run: |
          dvc remote modify --local s3remote url s3://$AWS_BUCKET_NAME/dvc-cache
          dvc add data/gold/mta_sarima.parquet
          dvc add data/gold/mta_ml.parquet
          dvc push
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add data/gold/mta_sarima.parquet.dvc data/gold/mta_ml.parquet.dvc
          git diff --cached --quiet || git commit -m "dvc: update gold parquets [skip ci]"
          git push
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

      - name: Backup MLflow DB before overwrite
        if: always()
        run: |
          TIMESTAMP=$(date -u +%Y%m%dT%H%M%S)
          aws s3 cp s3://$AWS_BUCKET_NAME/mlflow/mlflow.db \
            s3://$AWS_BUCKET_NAME/mlflow/backups/mlflow_${TIMESTAMP}.db || echo "No existing DB to back up"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

      - name: Upload MLflow state to S3
        if: always()
        run: |
          aws s3 cp mlflow.db s3://$AWS_BUCKET_NAME/mlflow/mlflow.db
          aws s3 sync mlruns/ s3://$AWS_BUCKET_NAME/mlflow/mlruns/
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

      - name: Trigger prediction pipeline
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'pipeline_prediction.yml',
              ref: 'main'
            });
