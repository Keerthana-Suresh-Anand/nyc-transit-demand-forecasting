name: Pipeline — Training

on:
  schedule:
    - cron: "0 15 1-7 * 3"   # First Wednesday of each month, 15:00 UTC
  workflow_dispatch: {}

concurrency:
  group: training
  cancel-in-progress: false

env:
  AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
  AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
  AWS_BUCKET_NAME: ${{ secrets.AWS_BUCKET_NAME }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  MLFLOW_TRACKING_URI: sqlite:///mlflow.db

jobs:
  train:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install DVC
        run: pip install "dvc[s3]>=3.0"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download data and MLflow state from S3
        run: |
          mkdir -p data/silver data/gold mlruns
          aws s3 cp s3://$AWS_BUCKET_NAME/silver/mta_weather_merged.parquet \
            data/silver/mta_weather_merged.parquet
          aws s3 cp s3://$AWS_BUCKET_NAME/mlflow/mlflow.db \
            mlflow.db || echo "No existing mlflow.db — starting fresh"
          aws s3 sync s3://$AWS_BUCKET_NAME/mlflow/mlruns/ mlruns/ || echo "No existing mlruns"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

      - name: Run training pipeline
        run: |
          touch mlflow.db
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/nyc-transit-pipeline:latest
          docker run --rm \
            -v "$(pwd)/data:/app/data" \
            -v "$(pwd)/mlflow.db:/app/mlflow.db" \
            -v "$(pwd)/mlruns:/app/mlruns" \
            -e AWS_ACCESS_KEY="$AWS_ACCESS_KEY" \
            -e AWS_SECRET_KEY="$AWS_SECRET_KEY" \
            -e AWS_BUCKET_NAME="$AWS_BUCKET_NAME" \
            -e AWS_REGION="$AWS_REGION" \
            -e MLFLOW_TRACKING_URI="sqlite:///mlflow.db" \
            ${{ secrets.DOCKERHUB_USERNAME }}/nyc-transit-pipeline:latest \
            -m pipelines.run_training

      - name: Snapshot gold data with DVC
        run: |
          dvc remote modify --local s3remote url s3://$AWS_BUCKET_NAME/dvc-cache
          dvc add data/gold/mta_sarima.parquet
          dvc add data/gold/mta_ml.parquet
          dvc push
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add data/gold/mta_sarima.parquet.dvc data/gold/mta_ml.parquet.dvc
          git diff --cached --quiet || git commit -m "dvc: update gold parquets [skip ci]"
          git push
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

      - name: Upload MLflow state to S3
        if: always()
        run: |
          aws s3 cp mlflow.db s3://$AWS_BUCKET_NAME/mlflow/mlflow.db
          aws s3 sync mlruns/ s3://$AWS_BUCKET_NAME/mlflow/mlruns/
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

      - name: Trigger prediction pipeline
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'pipeline_prediction.yml',
              ref: 'main'
            });
